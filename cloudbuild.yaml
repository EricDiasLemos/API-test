steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/api-test', '.']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - api-test
      - --image=gcr.io/$PROJECT_ID/api-test
      - --region=southamerica-east1
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=project-fa92f4d6-74f5-4c5b-b57:southamerica-east1:db1-json
      - --set-env-vars=DB_HOST=/cloudsql/project-fa92f4d6-74f5-4c5b-b57:southamerica-east1:db1-json,DB_NAME=testdb,DB_USER=postgres,DB_PASSWORD=SUA_SENHA

images:
  - gcr.io/$PROJECT_ID/api-test
